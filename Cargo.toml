[package]
name = "wash-cli"
version = "0.6.0"
authors = ["wasmCloud Team"]
edition = "2018"
repository = "https://github.com/wasmcloud/wash"
description = "wasmcloud Shell (wash) CLI tool"
license = "Apache-2.0"
readme = "README.md"
keywords = ["webassembly", "wasmcloud", "wash", "cli"]
categories = ["wasm", "command-line-utilities"]

[features]
default = []
#wasmtime = ["wasmcloud-host/wasmtime", "tui/termion", "termion"]
#wasm3 = ["wasmcloud-host/wasm3", "tui/termion", "termion"]

[badges]
maintenance = { status = "actively-developed" }

[dependencies]
structopt = "0.3.21"
serde_json = { version = "1.0.62", features = ["raw_value"] }
serde = { version = "1.0", features = ["derive"] }
#tui-logger = "0.6.3"
#tui = { version = "0.14.0", default-features = false }
log = "0.4.14"
env_logger = "0.9"
#termion = { version = "1.5", optional = true }
actix-rt = "2.2.0"
spinners = "1.2.0"
nats = "0.11"
once_cell = "1.5.2"
term-table = "1.3.1"
oci-distribution = "0.6.0"
crossbeam-channel = "0.5.1"
hotwatch = "0.4.5"

nkeys = "0.1.0"
wascap = "0.6.0"
provider-archive = "0.4.0"
#wasmcloud-host = { version = "0.18.2", default-features = false, optional = true }

[dependencies.wasmbus-rpc]
version = "0.2"
#path = "../weld/rpc-rs"

[dependencies.wasmcloud-control-interface]
version = "0.5"
path = "../interfaces/control/rust"

[dev-dependencies]
test_bin = "0.3.0"
reqwest = { version = "0.11", features = ["json"] }
#wasmcloud-host = { version = "0.18.2" }
#termion = "1.5"

[[bin]]
name = "wash"
path = "src/main.rs"
test = true
bench = true

name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt_clippy:
    name: Fmt & Clippy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run Rust check + clippy
        run: make rust-check
  unit_tests:
    name: Unit tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2022, macos-11]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v2
      - name: Run unit tests
        run: make test
  integration_tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Launch integration test services
        uses: sudo-bot/action-docker-compose@latest
        with:
          cli-args: "-f ./tools/docker-compose.yml up --detach"
      - name: Run integration tests
        run: cargo test --no-fail-fast --bin wash --test "integration*" -- --nocapture
